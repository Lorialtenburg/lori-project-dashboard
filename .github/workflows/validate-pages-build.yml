name: Validate GitHub Pages Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: outputs/project-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: outputs/project-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build GitHub Pages site
        run: npm run build:pages
